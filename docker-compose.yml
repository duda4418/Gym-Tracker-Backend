services:
  postgres:
    image: postgres:16
    container_name: gym-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gym_tracker_db
      POSTGRES_USER: postgres_gym_tracker
      POSTGRES_PASSWORD: password_gym_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_gym_tracker -d gym_tracker_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    container_name: gym-tracker-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8000:8000"
    volumes:
      - ./app/uploads:/app/app/uploads

  prometheus:
    image: prom/prometheus
    container_name: gym-tracker-prometheus
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  pgdata: