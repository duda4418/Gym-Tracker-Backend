services:
  postgres:
    image: postgres:16
    container_name: gym-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gym_tracker_db
      POSTGRES_USER: postgres_gym_tracker
      POSTGRES_PASSWORD: password_gym_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
